name: Minimal Digest Repro Check

on:
  workflow_dispatch:
    inputs:
      acr_repository:
        description: ACR repository for minimal reproducibility test
        required: true
        default: docker-component-version-test-minimal-repro
      publish_tag:
        description: Tag to update when digest changed
        required: true
        default: latest

jobs:
  repro-check:
    name: Compare latest digest and conditionally publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "AZURE_CREDENTIALS secret is missing"
            exit 1
          fi

          if [ -z "${{ secrets.ACR_NAME }}" ]; then
            echo "ACR_NAME secret is missing"
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare ACR context
        run: |
          set -euo pipefail
          ACR_NAME_RAW="${{ secrets.ACR_NAME }}"
          ACR_NAME=$(echo "$ACR_NAME_RAW" | tr '[:upper:]' '[:lower:]' | sed -e 's#^https\?://##' -e 's#/.*$##' -e 's#\.azurecr\.io$##' -e "s/[\"']//g" | xargs)
          ACR_LOGIN_SERVER="$ACR_NAME.azurecr.io"
          ACR_REPOSITORY="${{ inputs.acr_repository }}"
          PUBLISH_TAG="${{ inputs.publish_tag }}"
          TAG_PREFIX="repro-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          CANDIDATE_TAG="${TAG_PREFIX}-candidate"

          az acr login --name "$ACR_NAME"

          LATEST_DIGEST=$(az acr repository show-manifests \
            --name "$ACR_NAME" \
            --repository "$ACR_REPOSITORY" \
            --orderby time_desc \
            --query "[0].digest" \
            -o tsv 2>/dev/null || true)

          if [ -n "$LATEST_DIGEST" ] && [ "$LATEST_DIGEST" != "None" ]; then
            echo "LATEST_DIGEST=$LATEST_DIGEST" >> "$GITHUB_ENV"
            echo "Existing latest digest in repo: $LATEST_DIGEST"
          else
            echo "LATEST_DIGEST=" >> "$GITHUB_ENV"
            echo "Existing latest digest in repo: <none>"
          fi

          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"
          echo "ACR_REPOSITORY=$ACR_REPOSITORY" >> "$GITHUB_ENV"
          echo "PUBLISH_TAG=$PUBLISH_TAG" >> "$GITHUB_ENV"
          echo "CANDIDATE_TAG=$CANDIDATE_TAG" >> "$GITHUB_ENV"

          echo "Using registry: $ACR_LOGIN_SERVER"
          echo "Using repository: $ACR_REPOSITORY"
          echo "Publish tag: $PUBLISH_TAG"
          echo "Candidate tag: $CANDIDATE_TAG"

      - name: Build current image and push candidate
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --provenance=false \
            --sbom=false \
            --file Dockerfile.minimal-repro \
            --tag "$ACR_LOGIN_SERVER/$ACR_REPOSITORY:$CANDIDATE_TAG" \
            --push \
            .

          CANDIDATE_DIGEST=$(az acr repository show-manifests \
            --name "$ACR_NAME" \
            --repository "$ACR_REPOSITORY" \
            --orderby time_desc \
            --query "[?tags!=null && contains(tags, '$CANDIDATE_TAG')].digest | [0]" \
            -o tsv)

          if [ -z "$CANDIDATE_DIGEST" ]; then
            echo "Cannot find digest for candidate tag $CANDIDATE_TAG"
            exit 1
          fi

          echo "CANDIDATE_DIGEST=$CANDIDATE_DIGEST" >> "$GITHUB_ENV"
          echo "Current build digest: $CANDIDATE_DIGEST"

      - name: Compare with existing latest digest
        run: |
          set -euo pipefail
          {
            echo "## Minimal Digest Repro Check"
            echo ""
            echo "- Registry: $ACR_LOGIN_SERVER"
            echo "- Repository: $ACR_REPOSITORY"
            echo "- Publish tag: $PUBLISH_TAG"
            echo "- Existing latest digest: ${LATEST_DIGEST:-<none>}"
            echo "- Current build digest: $CANDIDATE_DIGEST"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${LATEST_DIGEST:-}" ] && [ "$LATEST_DIGEST" = "$CANDIDATE_DIGEST" ]; then
            echo "Result: identical digest exists, skip publishing."
            echo "- Result: identical digest exists, skip publishing" >> "$GITHUB_STEP_SUMMARY"
            echo "SHOULD_PUBLISH=false" >> "$GITHUB_ENV"
          else
            echo "Result: digests differ, proceed with publishing."
            echo "- Result: digests differ, proceed with publishing" >> "$GITHUB_STEP_SUMMARY"
            echo "SHOULD_PUBLISH=true" >> "$GITHUB_ENV"
          fi

      - name: Publish release tag when digest changed
        if: env.SHOULD_PUBLISH == 'true'
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "$ACR_LOGIN_SERVER/$ACR_REPOSITORY:$PUBLISH_TAG" \
            "$ACR_LOGIN_SERVER/$ACR_REPOSITORY@$CANDIDATE_DIGEST"

          echo "Published tag: $ACR_REPOSITORY:$PUBLISH_TAG -> $CANDIDATE_DIGEST"

          {
            echo "- Published: $ACR_REPOSITORY:$PUBLISH_TAG"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup temporary tags (best effort)
        if: always()
        run: |
          set +e
          az acr repository untag --name "$ACR_NAME" --image "$ACR_REPOSITORY:$CANDIDATE_TAG"
          exit 0
