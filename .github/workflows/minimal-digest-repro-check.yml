name: Minimal Digest Repro Check

on:
  workflow_dispatch:

jobs:
  repro-check:
    name: Build twice and compare digest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: First build
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --provenance=false \
            --sbom=false \
            --file Dockerfile.minimal-repro \
            --tag local/minimal-repro:first \
            --load \
            .

          IMAGE_ID_1=$(docker image inspect local/minimal-repro:first --format='{{.Id}}')
          echo "IMAGE_ID_1=$IMAGE_ID_1" >> "$GITHUB_ENV"
          echo "First build image ID: $IMAGE_ID_1"

      - name: Second build
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --provenance=false \
            --sbom=false \
            --file Dockerfile.minimal-repro \
            --tag local/minimal-repro:second \
            --load \
            .

          IMAGE_ID_2=$(docker image inspect local/minimal-repro:second --format='{{.Id}}')
          echo "IMAGE_ID_2=$IMAGE_ID_2" >> "$GITHUB_ENV"
          echo "Second build image ID: $IMAGE_ID_2"

      - name: Compare results
        run: |
          set -euo pipefail
          echo "Build #1 image ID: $IMAGE_ID_1"
          echo "Build #2 image ID: $IMAGE_ID_2"

          {
            echo "## Minimal Digest Repro Check"
            echo ""
            echo "- Build #1: $IMAGE_ID_1"
            echo "- Build #2: $IMAGE_ID_2"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$IMAGE_ID_1" = "$IMAGE_ID_2" ]; then
            echo "Result: identical image IDs (stable in this minimal scenario)."
            echo "- Result: identical image IDs" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Result: different image IDs (not reproducible yet)."
            echo "- Result: different image IDs" >> "$GITHUB_STEP_SUMMARY"
          fi
