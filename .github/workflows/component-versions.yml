name: Component Versions

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  component-versions:
    name: Print Docker component versions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build stage and print Go module versions
        run: |
          docker build \
            --progress=plain \
            --target build \
            --tag docker-component-version-test:build \
            .

      - name: Build Alpine image and print versions
        run: |
          docker build \
            --progress=plain \
            --target release-alpine \
            --tag docker-component-version-test:alpine \
            .

      - name: Build Ubuntu image and print versions
        run: |
          docker build \
            --progress=plain \
            --target release-ubuntu \
            --tag docker-component-version-test:ubuntu \
            .
