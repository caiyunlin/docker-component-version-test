name: Component Versions and ACR Conditional Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional next image version override (x.y.z)
        required: false
        type: string
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 21 * * *'

jobs:
  component-versions:
    name: Print versions and conditionally publish to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build stage and print Go module versions
        run: |
          docker build \
            --progress=plain \
            --target build \
            --tag docker-component-version-test:build \
            .

      - name: Build Alpine image and print versions
        run: |
          docker build \
            --progress=plain \
            --target release-alpine \
            --tag docker-component-version-test:alpine \
            .

      - name: Build Ubuntu image and print versions
        run: |
          docker build \
            --progress=plain \
            --target release-ubuntu \
            --tag docker-component-version-test:ubuntu \
            .

      - name: Validate required secrets for ACR publish
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "AZURE_CREDENTIALS secret is missing"
            exit 1
          fi

          if [ -z "${{ secrets.ACR_NAME }}" ]; then
            echo "ACR_NAME secret is missing"
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Prepare ACR context
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          ACR_NAME_RAW="$ACR_NAME"
          ACR_NAME=$(echo "$ACR_NAME_RAW" | tr '[:upper:]' '[:lower:]' | sed -e 's#^https\?://##' -e 's#/.*$##' -e 's#\.azurecr\.io$##' -e "s/[\"']//g" | xargs)
          ACR_LOGIN_SERVER="$ACR_NAME.azurecr.io"
          ACR_REPOSITORY="docker-component-version-test"

          az acr login --name "$ACR_NAME"

          TAGS=$(az acr repository show-tags \
            --name "$ACR_NAME" \
            --repository "$ACR_REPOSITORY" \
            -o tsv 2>/dev/null || true)

          CURRENT_VERSION=$(printf '%s\n' "$TAGS" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)

          if [ -n "${INPUT_VERSION:-}" ]; then
            NEXT_VERSION="$INPUT_VERSION"
            if ! echo "$NEXT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Invalid input version: $NEXT_VERSION. Expected x.y.z"
              exit 1
            fi
          elif [ -z "$CURRENT_VERSION" ]; then
            NEXT_VERSION="0.1.0"
          else
            IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
            NEXT_VERSION="$major.$minor.$((patch + 1))"
          fi

          CURRENT_DIGEST=$(az acr manifest list-metadata \
            --registry "$ACR_NAME" \
            --name "$ACR_REPOSITORY" \
            --orderby time_desc \
            --query "[?tags!=null && contains(tags, '$CURRENT_VERSION')].digest | [0]" \
            -o tsv 2>/dev/null || true)

          if [ -n "$CURRENT_DIGEST" ] && [ "$CURRENT_DIGEST" != "None" ]; then
            echo "CURRENT_DIGEST=$CURRENT_DIGEST" >> "$GITHUB_ENV"
            echo "Current digest for $CURRENT_VERSION: $CURRENT_DIGEST"
          else
            echo "CURRENT_DIGEST=" >> "$GITHUB_ENV"
            if [ -n "$CURRENT_VERSION" ]; then
              echo "Current digest for $CURRENT_VERSION: <none>"
            else
              echo "Current version: <none>"
            fi
          fi

          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"
          echo "ACR_REPOSITORY=$ACR_REPOSITORY" >> "$GITHUB_ENV"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> "$GITHUB_ENV"
          echo "NEXT_VERSION=$NEXT_VERSION" >> "$GITHUB_ENV"

          echo "Using registry: $ACR_LOGIN_SERVER"
          echo "Using repository: $ACR_REPOSITORY"
          echo "Current version: ${CURRENT_VERSION:-<none>}"
          echo "Next version: $NEXT_VERSION"

      - name: Build current Ubuntu image and push next version
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --provenance=false \
            --sbom=false \
            --target release-ubuntu \
            --tag "$ACR_LOGIN_SERVER/$ACR_REPOSITORY:$NEXT_VERSION" \
            --push \
            .

          NEXT_DIGEST=$(az acr manifest list-metadata \
            --registry "$ACR_NAME" \
            --name "$ACR_REPOSITORY" \
            --orderby time_desc \
            --query "[?tags!=null && contains(tags, '$NEXT_VERSION')].digest | [0]" \
            -o tsv)

          if [ -z "$NEXT_DIGEST" ]; then
            echo "Cannot find digest for next version tag $NEXT_VERSION"
            exit 1
          fi

          echo "NEXT_DIGEST=$NEXT_DIGEST" >> "$GITHUB_ENV"
          echo "Next build digest: $NEXT_DIGEST"

      - name: Compare current and next versions
        run: |
          set -euo pipefail

          resolve_effective_size() {
            local digest="$1"
            local media_type
            local direct_size
            local child_digest
            local child_size

            if [ -z "$digest" ]; then
              echo ""
              return 0
            fi

            media_type=$(az acr manifest list-metadata \
              --registry "$ACR_NAME" \
              --name "$ACR_REPOSITORY" \
              --orderby time_desc \
              --query "[?digest=='$digest'].mediaType | [0]" \
              -o tsv 2>/dev/null || true)

            # If this is a manifest list / image index, resolve to the linux/amd64 child
            # and report THAT child's imageSize (layers + config bytes). The top-level
            # imageSize of an index is typically 0 / the index JSON size, which is useless
            # for comparing actual image content.
            if [ "$media_type" = "application/vnd.docker.distribution.manifest.list.v2+json" ] || [ "$media_type" = "application/vnd.oci.image.index.v1+json" ]; then
              child_digest=$(az acr manifest show \
                --registry "$ACR_NAME" \
                --name "$ACR_REPOSITORY@$digest" \
                --query "manifests[?platform.os=='linux' && platform.architecture=='amd64'].digest | [0]" \
                -o tsv 2>/dev/null || true)

              if [ -z "$child_digest" ] || [ "$child_digest" = "None" ]; then
                child_digest=$(az acr manifest show \
                  --registry "$ACR_NAME" \
                  --name "$ACR_REPOSITORY@$digest" \
                  --query "manifests[0].digest" \
                  -o tsv 2>/dev/null || true)
              fi

              if [ -n "$child_digest" ] && [ "$child_digest" != "None" ]; then
                child_size=$(az acr manifest list-metadata \
                  --registry "$ACR_NAME" \
                  --name "$ACR_REPOSITORY" \
                  --orderby time_desc \
                  --query "[?digest=='$child_digest'].imageSize | [0]" \
                  -o tsv 2>/dev/null || true)

                if [ -n "$child_size" ] && [ "$child_size" != "None" ] && [ "$child_size" != "0" ]; then
                  echo "$child_size"
                  return 0
                fi
              fi
            fi

            # Single-platform image: top-level imageSize is the real content size.
            direct_size=$(az acr manifest list-metadata \
              --registry "$ACR_NAME" \
              --name "$ACR_REPOSITORY" \
              --orderby time_desc \
              --query "[?digest=='$digest'].imageSize | [0]" \
              -o tsv 2>/dev/null || true)

            if [ -n "$direct_size" ] && [ "$direct_size" != "None" ] && [ "$direct_size" != "0" ]; then
              echo "$direct_size"
              return 0
            fi

            echo ""
          }

          CURRENT_IMAGE_SIZE=$(resolve_effective_size "${CURRENT_DIGEST:-}")
          NEXT_IMAGE_SIZE=$(resolve_effective_size "$NEXT_DIGEST")

          if [ -n "$CURRENT_IMAGE_SIZE" ]; then
            echo "CURRENT_IMAGE_SIZE=$CURRENT_IMAGE_SIZE" >> "$GITHUB_ENV"
          else
            echo "CURRENT_IMAGE_SIZE=" >> "$GITHUB_ENV"
          fi

          if [ -n "$NEXT_IMAGE_SIZE" ]; then
            echo "NEXT_IMAGE_SIZE=$NEXT_IMAGE_SIZE" >> "$GITHUB_ENV"
          else
            echo "NEXT_IMAGE_SIZE=" >> "$GITHUB_ENV"
          fi

          {
            echo "## Component Versions ACR Publish"
            echo ""
            echo "- Registry: $ACR_LOGIN_SERVER"
            echo "- Repository: $ACR_REPOSITORY"
            echo "- Current version: ${CURRENT_VERSION:-<none>}"
            echo "- Next version: $NEXT_VERSION"
            echo "- Current digest: ${CURRENT_DIGEST:-<none>}"
            echo "- Next digest: $NEXT_DIGEST"
            echo "- Current image size: ${CURRENT_IMAGE_SIZE:-<unknown>}"
            echo "- Next image size: ${NEXT_IMAGE_SIZE:-<unknown>}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${CURRENT_DIGEST:-}" ] && [ "$CURRENT_DIGEST" = "$NEXT_DIGEST" ]; then
            echo "Result: current and next digest are identical."
            echo "- Result: current and next digest are identical" >> "$GITHUB_STEP_SUMMARY"
            echo "SHOULD_RUN_TERRATEST=false" >> "$GITHUB_ENV"
          elif [ -n "${CURRENT_DIGEST:-}" ] && [ -n "${CURRENT_IMAGE_SIZE:-}" ] && [ -n "${NEXT_IMAGE_SIZE:-}" ] && [ "$CURRENT_IMAGE_SIZE" = "$NEXT_IMAGE_SIZE" ]; then
            echo "Result: digest changed but effective image size unchanged."
            echo "- Result: digest changed but effective image size unchanged" >> "$GITHUB_STEP_SUMMARY"
            echo "SHOULD_RUN_TERRATEST=false" >> "$GITHUB_ENV"
          elif [ -n "${CURRENT_DIGEST:-}" ] && [ -n "${CURRENT_IMAGE_SIZE:-}" ] && [ -n "${NEXT_IMAGE_SIZE:-}" ] && [ "$CURRENT_DIGEST" != "$NEXT_DIGEST" ] && [ "$CURRENT_IMAGE_SIZE" != "$NEXT_IMAGE_SIZE" ]; then
            echo "Result: digest and effective image size both changed. Run terratest."
            echo "- Result: digest and effective image size both changed (run terratest)" >> "$GITHUB_STEP_SUMMARY"
            echo "SHOULD_RUN_TERRATEST=true" >> "$GITHUB_ENV"
          else
            echo "Result: digest/size indicate content change."
            echo "- Result: digest/size indicate content change" >> "$GITHUB_STEP_SUMMARY"
            echo "SHOULD_RUN_TERRATEST=false" >> "$GITHUB_ENV"
          fi

      - name: Update Container App to next ACR image (Go)
        if: env.SHOULD_RUN_TERRATEST == 'true'
        env:
          ACA_NAME: docker-component-version-test
          ACA_RESOURCE_GROUP: ${{ vars.ACA_RESOURCE_GROUP || 'ACARG' }}
          ACA_IMAGE: ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:${{ env.NEXT_VERSION }}
        run: |
          set -euo pipefail
          go run ./cmd/update-containerapp-image

      - name: Skip Container App update
        if: env.SHOULD_RUN_TERRATEST != 'true'
        run: echo "SHOULD_RUN_TERRATEST is not true; skip Container App image update."
