name: Component Versions and ACR Conditional Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 21 * * *'

jobs:
  component-versions:
    name: Print versions and conditionally publish to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build stage and print Go module versions
        run: |
          docker build \
            --progress=plain \
            --target build \
            --tag docker-component-version-test:build \
            .

      - name: Build Alpine image and print versions
        run: |
          docker build \
            --progress=plain \
            --target release-alpine \
            --tag docker-component-version-test:alpine \
            .

      - name: Build Ubuntu image and print versions
        run: |
          docker build \
            --progress=plain \
            --target release-ubuntu \
            --tag docker-component-version-test:ubuntu \
            .

      - name: Validate required secrets for ACR publish
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "AZURE_CREDENTIALS secret is missing"
            exit 1
          fi

          if [ -z "${{ secrets.ACR_NAME }}" ]; then
            echo "ACR_NAME secret is missing"
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Conditional publish default Ubuntu image to ACR (tag 1.0)
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: |
          go run ./cmd/acr-push-if-changed \
            -acr-name "$ACR_NAME" \
            -repository "docker-component-version-test" \
            -tag "1.0" \
            -target "release-ubuntu" \
            -platform "linux/amd64" \
            -test-cmd "go test ./..."
