name: Component Versions and ACR Conditional Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional next image version override (x.y.z)
        required: false
        type: string
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 21 * * *'

jobs:
  component-versions:
    name: Print versions and conditionally publish to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build stage and print Go module versions
        run: |
          docker build \
            --progress=plain \
            --target build \
            --tag docker-component-version-test:build \
            .

      - name: Build Alpine image and print versions
        run: |
          docker build \
            --progress=plain \
            --target release-alpine \
            --tag docker-component-version-test:alpine \
            .

      - name: Build Ubuntu image and print versions
        run: |
          docker build \
            --progress=plain \
            --target release-ubuntu \
            --tag docker-component-version-test:ubuntu \
            .

      - name: Validate required secrets for ACR publish
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "AZURE_CREDENTIALS secret is missing"
            exit 1
          fi

          if [ -z "${{ secrets.ACR_NAME }}" ]; then
            echo "ACR_NAME secret is missing"
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Prepare ACR context
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          ACR_NAME_RAW="$ACR_NAME"
          ACR_NAME=$(echo "$ACR_NAME_RAW" | tr '[:upper:]' '[:lower:]' | sed -e 's#^https\?://##' -e 's#/.*$##' -e 's#\.azurecr\.io$##' -e "s/[\"']//g" | xargs)
          ACR_LOGIN_SERVER="$ACR_NAME.azurecr.io"
          ACR_REPOSITORY="docker-component-version-test"

          az acr login --name "$ACR_NAME"

          TAGS=$(az acr repository show-tags \
            --name "$ACR_NAME" \
            --repository "$ACR_REPOSITORY" \
            -o tsv 2>/dev/null || true)

          CURRENT_VERSION=$(printf '%s\n' "$TAGS" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)

          if [ -n "${INPUT_VERSION:-}" ]; then
            NEXT_VERSION="$INPUT_VERSION"
            if ! echo "$NEXT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Invalid input version: $NEXT_VERSION. Expected x.y.z"
              exit 1
            fi
          elif [ -z "$CURRENT_VERSION" ]; then
            NEXT_VERSION="0.1.0"
          else
            IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
            NEXT_VERSION="$major.$minor.$((patch + 1))"
          fi

          CURRENT_DIGEST=$(az acr manifest list-metadata \
            --registry "$ACR_NAME" \
            --name "$ACR_REPOSITORY" \
            --orderby time_desc \
            --query "[?tags!=null && contains(tags, '$CURRENT_VERSION')].digest | [0]" \
            -o tsv 2>/dev/null || true)

          if [ -n "$CURRENT_DIGEST" ] && [ "$CURRENT_DIGEST" != "None" ]; then
            echo "CURRENT_DIGEST=$CURRENT_DIGEST" >> "$GITHUB_ENV"
            echo "Current digest for $CURRENT_VERSION: $CURRENT_DIGEST"
          else
            echo "CURRENT_DIGEST=" >> "$GITHUB_ENV"
            if [ -n "$CURRENT_VERSION" ]; then
              echo "Current digest for $CURRENT_VERSION: <none>"
            else
              echo "Current version: <none>"
            fi
          fi

          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"
          echo "ACR_REPOSITORY=$ACR_REPOSITORY" >> "$GITHUB_ENV"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> "$GITHUB_ENV"
          echo "NEXT_VERSION=$NEXT_VERSION" >> "$GITHUB_ENV"

          echo "Using registry: $ACR_LOGIN_SERVER"
          echo "Using repository: $ACR_REPOSITORY"
          echo "Current version: ${CURRENT_VERSION:-<none>}"
          echo "Next version: $NEXT_VERSION"

      - name: Build current Ubuntu image and push next version
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --provenance=false \
            --sbom=false \
            --target release-ubuntu \
            --tag "$ACR_LOGIN_SERVER/$ACR_REPOSITORY:$NEXT_VERSION" \
            --push \
            .

          NEXT_DIGEST=$(az acr manifest list-metadata \
            --registry "$ACR_NAME" \
            --name "$ACR_REPOSITORY" \
            --orderby time_desc \
            --query "[?tags!=null && contains(tags, '$NEXT_VERSION')].digest | [0]" \
            -o tsv)

          if [ -z "$NEXT_DIGEST" ]; then
            echo "Cannot find digest for next version tag $NEXT_VERSION"
            exit 1
          fi

          echo "NEXT_DIGEST=$NEXT_DIGEST" >> "$GITHUB_ENV"
          echo "Next build digest: $NEXT_DIGEST"

      - name: Compare current and next versions
        run: |
          set -euo pipefail
          go run ./cmd/compare-acr-images

      - name: Validate ACA access before update
        if: env.SHOULD_RUN_TERRATEST == 'true'
        env:
          ACA_NAME: docker-component-version-test
          ACA_RESOURCE_GROUP: ${{ vars.ACA_RESOURCE_GROUP || 'ACARG' }}
        run: |
          set -euo pipefail
          az containerapp show \
            --name "$ACA_NAME" \
            --resource-group "$ACA_RESOURCE_GROUP" \
            --query name \
            -o tsv >/dev/null
          echo "ACA access check passed for $ACA_NAME in $ACA_RESOURCE_GROUP"

      - name: Update Container App to next ACR image (Go)
        if: env.SHOULD_RUN_TERRATEST == 'true'
        env:
          ACA_NAME: docker-component-version-test
          ACA_RESOURCE_GROUP: ${{ vars.ACA_RESOURCE_GROUP || 'ACARG' }}
          ACA_SUBSCRIPTION_ID: ${{ vars.ACA_SUBSCRIPTION_ID || '' }}
          ACA_IMAGE: ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:${{ env.NEXT_VERSION }}
        run: |
          set -euo pipefail
          go run ./cmd/update-containerapp-image

      - name: Skip Container App update
        if: env.SHOULD_RUN_TERRATEST != 'true'
        run: echo "SHOULD_RUN_TERRATEST is not true; skip Container App image update."
